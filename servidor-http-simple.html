<h1>Servidor HTTP Simple</h1>

<p>Tres formas de levantar un servidor HTTP simple en el puerto 3000 con tres lenguajes diferentes:</p>

<h2>Node.js</h2>

<p>Usando el paquete <code>serve</code>:</p>

<pre>
npm install -g serve
serve -s .
</pre>

<h2>Python 3</h2>

<pre>
python3 -m http.server 3000
</pre>

<h2>Ruby</h2>

<pre>
ruby -run -e httpd . -p 3000
</pre>
