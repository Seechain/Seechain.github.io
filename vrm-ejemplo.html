<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ejemplo VRM con Three.js</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #1a1a2e; }
    canvas { display: block; }
    #info {
      position: absolute;
      top: 20px;
      left: 20px;
      color: #fff;
      font-family: system-ui, sans-serif;
      background: rgba(0,0,0,0.7);
      padding: 15px 20px;
      border-radius: 8px;
      max-width: 350px;
    }
    #info h1 { font-size: 1.2rem; margin-bottom: 10px; color: #ff6b9d; }
    #info p { font-size: 0.9rem; line-height: 1.5; opacity: 0.9; }
    #loading {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #ff6b9d;
      font-family: system-ui, sans-serif;
      font-size: 1.2rem;
    }
  </style>
</head>
<body>
  <div id="info">
    <h1>Sala VRM con Three.js</h1>
    <p>Este ejemplo muestra una sala rendered con Three.js + three-vrm para carregar avatares VRM en la web.</p>
  </div>
  <div id="loading">Cargando escena...</div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/",
      "three-vrm": "https://cdn.jsdelivr.net/npm/three-vrm@3.1.0/build/three-vrm.module.js"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { VRMLoaderPlugin, VRMHumanBoneName } from 'three-vrm';

    let scene, camera, renderer, controls, currentVrm;
    const clock = new THREE.Clock();

    init();
    animate();

    function init() {
      scene = new THREE.Scene();
      scene.background = new THREE.Color(0x2d2d44);

      camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
      camera.position.set(0, 2, 5);

      renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(window.devicePixelRatio);
      renderer.shadowMap.enabled = true;
      renderer.shadowMap.type = THREE.PCFSoftShadowMap;
      renderer.outputColorSpace = THREE.SRGBColorSpace;
      document.body.appendChild(renderer.domElement);

      controls = new OrbitControls(camera, renderer.domElement);
      controls.target.set(0, 1, 0);
      controls.update();

      setupLights();
      createRoom();
      createSofa();
      createTV();
      createPosters();
      loadVRM();

      document.getElementById('loading').style.display = 'none';

      window.addEventListener('resize', onWindowResize);
    }

    function setupLights() {
      const ambient = new THREE.AmbientLight(0x404060, 0.5);
      scene.add(ambient);

      const mainLight = new THREE.DirectionalLight(0xfff5e6, 1.2);
      mainLight.position.set(5, 8, 5);
      mainLight.castShadow = true;
      mainLight.shadow.mapSize.width = 2048;
      mainLight.shadow.mapSize.height = 2048;
      mainLight.shadow.camera.near = 0.5;
      mainLight.shadow.camera.far = 50;
      mainLight.shadow.camera.left = -10;
      mainLight.shadow.camera.right = 10;
      mainLight.shadow.camera.top = 10;
      mainLight.shadow.camera.bottom = -10;
      scene.add(mainLight);

      const lampLight = new THREE.PointLight(0xffaa55, 0.8, 10);
      lampLight.position.set(-2, 2.5, -2);
      scene.add(lampLight);

      const tvLight = new THREE.PointLight(0x3388ff, 0.3, 4);
      tvLight.position.set(0, 1.2, -3.5);
      scene.add(tvLight);
    }

    function createRoom() {
      const floorGeo = new THREE.PlaneGeometry(8, 8);
      const floorMat = new THREE.MeshStandardMaterial({ 
        color: 0x4a3f35,
        roughness: 0.8
      });
      const floor = new THREE.Mesh(floorGeo, floorMat);
      floor.rotation.x = -Math.PI / 2;
      floor.receiveShadow = true;
      scene.add(floor);

      const wallMat = new THREE.MeshStandardMaterial({ color: 0x3d3d5c, roughness: 0.9 });
      
      const backWall = new THREE.Mesh(new THREE.PlaneGeometry(8, 4), wallMat);
      backWall.position.set(0, 2, -4);
      backWall.receiveShadow = true;
      scene.add(backWall);

      const leftWall = new THREE.Mesh(new THREE.PlaneGeometry(8, 4), wallMat);
      leftWall.position.set(-4, 2, 0);
      leftWall.rotation.y = Math.PI / 2;
      leftWall.receiveShadow = true;
      scene.add(leftWall);

      const rightWall = new THREE.Mesh(new THREE.PlaneGeometry(8, 4), wallMat);
      rightWall.position.set(4, 2, 0);
      rightWall.rotation.y = -Math.PI / 2;
      rightWall.receiveShadow = true;
      scene.add(rightWall);
    }

    function createSofa() {
      const sofaGroup = new THREE.Group();
      
      const sofaMat = new THREE.MeshStandardMaterial({ color: 0x8b4557, roughness: 0.7 });
      const sofaDarkMat = new THREE.MeshStandardMaterial({ color: 0x2a1f2a, roughness: 0.7 });

      const base = new THREE.Mesh(new THREE.BoxGeometry(2.2, 0.4, 0.9), sofaMat);
      base.position.y = 0.25;
      base.castShadow = true;
      base.receiveShadow = true;
      sofaGroup.add(base);

      const seat = new THREE.Mesh(new THREE.BoxGeometry(2.1, 0.2, 0.8), sofaMat);
      seat.position.set(0, 0.55, 0.05);
      seat.castShadow = true;
      sofaGroup.add(seat);

      const back = new THREE.Mesh(new THREE.BoxGeometry(2.2, 0.7, 0.25), sofaMat);
      back.position.set(0, 0.9, -0.35);
      back.castShadow = true;
      sofaGroup.add(back);

      const armLeft = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.5, 0.9), sofaDarkMat);
      armLeft.position.set(-1.1, 0.7, 0);
      armLeft.castShadow = true;
      sofaGroup.add(armLeft);

      const armRight = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.5, 0.9), sofaDarkMat);
      armRight.position.set(1.1, 0.7, 0);
      armRight.castShadow = true;
      sofaGroup.add(armRight);

      const legGeo = new THREE.CylinderGeometry(0.04, 0.04, 0.1);
      const legMat = new THREE.MeshStandardMaterial({ color: 0x1a1a1a });
      const legPositions = [[-0.9, 0.05, 0.35], [0.9, 0.05, 0.35], [-0.9, 0.05, -0.35], [0.9, 0.05, -0.35]];
      legPositions.forEach(pos => {
        const leg = new THREE.Mesh(legGeo, legMat);
        leg.position.set(...pos);
        sofaGroup.add(leg);
      });

      sofaGroup.position.set(0, 0, 1);
      scene.add(sofaGroup);
    }

    function createTV() {
      const tvGroup = new THREE.Group();
      
      const tvMat = new THREE.MeshStandardMaterial({ color: 0x1a1a1a, metalness: 0.3 });
      const screenMat = new THREE.MeshStandardMaterial({ 
        color: 0x112244, 
        emissive: 0x112244,
        emissiveIntensity: 0.2
      });

      const screen = new THREE.Mesh(new THREE.BoxGeometry(1.4, 0.8, 0.05), screenMat);
      screen.position.z = 0.025;
      tvGroup.add(screen);

      const frame = new THREE.Mesh(new THREE.BoxGeometry(1.5, 0.9, 0.08), tvMat);
      frame.castShadow = true;
      tvGroup.add(frame);

      const stand = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.3, 0.4), tvMat);
      stand.position.set(0, -0.55, 0.1);
      tvGroup.add(stand);

      const tvTable = new THREE.Mesh(new THREE.BoxGeometry(1.6, 0.4, 0.5), tvMat);
      tvTable.position.y = -0.8;
      scene.add(tvTable);

      tvGroup.position.set(0, 1.3, -3.45);
      scene.add(tvGroup);
    }

    function createPosters() {
      createPoster(-2.5, 1.8, -3.9, 0.8, 1.0, 0xff6b9d, 'Arte');
      createPoster(2.5, 1.8, -3.9, 0.8, 1.0, 0x6bff8b, 'Música');
      createPoster(-3.9, 1.8, 0, 0.6, 0.8, 0x6b9dff, 'Viaje', Math.PI / 2);
    }

    function createPoster(x, y, z, w, h, color, label, rotY = 0) {
      const frameMat = new THREE.MeshStandardMaterial({ color: 0x2a2a2a });
      const artMat = new THREE.MeshStandardMaterial({ color: color, roughness: 0.6 });

      const frame = new THREE.Mesh(new THREE.BoxGeometry(w + 0.1, h + 0.1, 0.03), frameMat);
      const art = new THREE.Mesh(new THREE.BoxGeometry(w, h, 0.02), artMat);
      art.position.z = 0.015;

      const group = new THREE.Group();
      group.add(frame);
      group.add(art);
      
      group.position.set(x, y, z);
      group.rotation.y = rotY;
      scene.add(group);

      const canvas = document.createElement('canvas');
      canvas.width = 128;
      canvas.height = 128;
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = `#${color.toString(16).padStart(6, '0')}`;
      ctx.fillRect(0, 0, 128, 128);
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 24px system-ui';
      ctx.textAlign = 'center';
      ctx.fillText(label[0], 64, 75);
    }

    async function loadVRM() {
      const loader = new THREE.VRMLoader();
      
      try {
        const vrmUrl = 'https://pixiv.github.io/three-vrm/packages/three-vrm/examples/models/VRM1_Constraint_Twist_Sample.vrm';
        const vrm = await loader.loadAsync(vrmUrl);
        
        vrm.scene.position.set(0, 0, 0.5);
        vrm.scene.scale.set(1, 1, 1);
        vrm.scene.traverse((obj) => {
          if (obj.isMesh) {
            obj.castShadow = true;
            obj.receiveShadow = true;
          }
        });
        
        scene.add(vrm.scene);
        currentVrm = vrm;

      } catch (e) {
        console.log('VRM no disponible, usando placeholder:', e.message);
        createPlaceholderAvatar();
      }
    }

    function createPlaceholderAvatar() {
      const bodyMat = new THREE.MeshStandardMaterial({ color: 0xffccaa });
      const clothMat = new THREE.MeshStandardMaterial({ color: 0x4488ff });
      
      const group = new THREE.Group();
      
      const body = new THREE.Mesh(new THREE.CapsuleGeometry(0.25, 0.8, 8, 16), bodyMat);
      body.position.y = 1.1;
      group.add(body);
      
      const head = new THREE.Mesh(new THREE.SphereGeometry(0.2, 16, 16), bodyMat);
      head.position.y = 1.8;
      group.add(head);
      
      const torso = new THREE.Mesh(new THREE.CylinderGeometry(0.25, 0.3, 0.6, 16), clothMat);
      torso.position.y = 1.4;
      group.add(torso);
      
      const legL = new THREE.Mesh(new THREE.CapsuleGeometry(0.08, 0.5, 8, 8), clothMat);
      legL.position.set(-0.12, 0.55, 0);
      group.add(legL);
      
      const legR = new THREE.Mesh(new THREE.CapsuleGeometry(0.08, 0.5, 8, 8), clothMat);
      legR.position.set(0.12, 0.55, 0);
      group.add(legR);

      group.position.set(0, 0, 0.5);
      scene.add(group);
      currentVrm = { scene: group };
    }

    function onWindowResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function animate() {
      requestAnimationFrame(animate);
      
      const delta = clock.getDelta();
      
      if (currentVrm && currentVrm.scene) {
        currentVrm.scene.rotation.y += delta * 0.2;
      }
      
      controls.update();
      renderer.render(scene, camera);
    }
  </script>
</body>
</html>
